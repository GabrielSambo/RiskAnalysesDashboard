<div class="chat-page">
  <main class="chat-container">
    <div class="messages-area" #messagesContainer>
      @for (msg of messages; track $index) {
        <app-chat-message [message]="msg"></app-chat-message>
      }

      @if (isLoading) {
        <div class="typing-indicator">
          <div class="avatar">
            <img src="assets/img/Circle.png" alt="Maestro" class="avatar-image">
          </div>
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      }
    </div>

    <div class="input-area">
      <app-chat-input
        [disabled]="isLoading"
        (messageSubmit)="onSendMessage($event)"
      ></app-chat-input>
    </div>
  </main>
</div>
