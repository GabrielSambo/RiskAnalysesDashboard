<div class="chat-input-wrapper">
  <div class="chat-input">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="value"
        (keydown)="onKeyDown($event)"
        [disabled]="disabled"
        [placeholder]="placeholder"
        class="message-input"
        rows="1"
      ></textarea>
      <button
        (click)="onSubmit()"
        [disabled]="!value.trim() || disabled"
        class="send-btn"
        aria-label="Send message"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="18" viewBox="0 0 17 18" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"

            fill="url(#paint0_radial)" />
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M2.76427 8.75003C2.76427 8.33581 3.02947 8.00003 3.35662 8.00003L15.5983 8.00003C15.9255 8.00003 16.1907 8.33581 16.1907 8.75002C16.1907 9.16424 15.9255 9.50003 15.5983 9.50003L3.35662 9.50003C3.02947 9.50003 2.76427 9.16424 2.76427 8.75003Z"
            fill="url(#paint1_radial)" />
          <defs>
            <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
              gradientTransform="translate(-6.09079 8.75003) scale(27.8522 30.1046)">
              <stop offset="0.998309" stop-color="#FFE200" />
            </radialGradient>
            <radialGradient id="paint1_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
              gradientTransform="translate(-6.09079 8.75003) scale(27.8522 30.1046)">

  </div>
</div>
