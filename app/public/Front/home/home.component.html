<div class="home-page">

  <div class="home-header">
    <div class="home-header-text">
      <h1 class="home-title"><span class="title-white">Data</span><span class="title-yellow">Graph</span></h1>
      <p class="home-subtitle">Selecciona una herramienta de análisis para comenzar</p>
    </div>
  </div>

  <div class="cards-grid">

    <!-- Graph View -->
    <button class="feature-card" (click)="navigate('/app/graph-view')">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="12" r="2"/>
          <circle cx="19" cy="5" r="2"/>
          <circle cx="19" cy="19" r="2"/>
          <circle cx="12" cy="12" r="2.5"/>
          <line x1="7" y1="12" x2="10" y2="12"/>
          <line x1="14" y1="12" x2="17" y2="6.5"/>
          <line x1="14" y1="12" x2="17" y2="17.5"/>
        </svg>
      </div>
      <div class="card-content">
        <h2 class="card-title">Visualizador de Grafo</h2>
        <p class="card-desc">Explora el Knowledge Graph de forma interactiva. Filtra, navega y analiza las conexiones entre entidades.</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

    <!-- Talk with Graph -->
    <button class="feature-card" (click)="navigate('/app/chat')">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="card-content">
        <h2 class="card-title">Talk with Graph</h2>
        <p class="card-desc">Interactúa con tu Knowledge Graph usando lenguaje natural. Haz preguntas y obtén respuestas directamente de tus datos.</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

    <!-- Shortest Path -->
    <button class="feature-card" (click)="navigate('/app/shortest-path')">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="4" cy="12" r="2"/>
          <circle cx="20" cy="12" r="2"/>
          <circle cx="12" cy="6" r="2"/>
          <line x1="6" y1="12" x2="10" y2="12"/>
          <line x1="14" y1="12" x2="18" y2="12"/>
          <line x1="5.4" y1="10.8" x2="10.5" y2="7.2"/>
          <line x1="13.5" y1="7.2" x2="18.6" y2="10.8"/>
        </svg>
      </div>
      <div class="card-content">
        <h2 class="card-title">Shortest Path</h2>
        <p class="card-desc">Encuentra el camino más corto entre dos entidades del grafo y descubre cómo están conectadas entre sí.</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

    <!-- Clustering -->
    <button class="feature-card" (click)="navigate('/app/clustering')">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="3"/>
          <circle cx="16" cy="8" r="3"/>
          <circle cx="8" cy="16" r="3"/>
          <circle cx="16" cy="16" r="3"/>
          <line x1="11" y1="8" x2="13" y2="8"/>
          <line x1="8" y1="11" x2="8" y2="13"/>
          <line x1="16" y1="11" x2="16" y2="13"/>
          <line x1="11" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <div class="card-content">
        <h2 class="card-title">Clustering</h2>
        <p class="card-desc">Detecta comunidades y grupos de nodos relacionados dentro del grafo usando algoritmos avanzados de clustering.</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

    <!-- Centrality -->
    <button class="feature-card" (click)="navigate('/app/centrality')">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="3" x2="12" y2="9"/>
          <line x1="12" y1="15" x2="12" y2="21"/>
          <line x1="3" y1="12" x2="9" y2="12"/>
          <line x1="15" y1="12" x2="21" y2="12"/>
        </svg>
      </div>
      <div class="card-content">
        <h2 class="card-title">Centrality</h2>
        <p class="card-desc">Identifica los nodos más influyentes del grafo mediante PageRank, Betweenness y Degree centrality.</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </button>

  </div>

</div>
