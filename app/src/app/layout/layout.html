<div class="layout">
  <header class="topbar">
    <div class="topbar-header">
      <div class="brand-txt">
        <strong>Control de Datos</strong>
        <span>Dashboard IA · Riesgo de credito</span>
      </div>

      <div class="settings">
        <button class="settings-toggle" type="button" (click)="toggleDropdown()" aria-haspopup="true" aria-expanded="{{ showSettings }}" aria-label="Ajustes de tema">
          <span class="settings-icon">⚙</span>
        </button>
        <div class="settings-dropdown" *ngIf="showSettings">
          <div class="settings-title">Fondo</div>
          <button type="button" class="theme-option" [class.active]="theme === 'dark'" (click)="setTheme('dark')">Dark</button>
          <button type="button" class="theme-option" [class.active]="theme === 'light'" (click)="setTheme('light')">Light</button>
        </div>
      </div>
    </div>

    <nav class="topnav">
      <a *ngFor="let n of nav"
         class="nav-item"
         [routerLink]="n.ruta"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">
        {{ n.titulo }}
      </a>
    </nav>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<app-agent-panel></app-agent-panel>
<app-contracts-modal></app-contracts-modal>
