<div class="layout">
  <header class="topbar">
    <div class="topbar-header">
      <div class="brand-txt">
        <strong>Control de Datos</strong>
        <span>Dashboard IA · Riesgo de credito</span>
      </div>
    </div>

    <nav class="topnav">
      <a *ngFor="let n of nav"
         class="nav-item"
         [routerLink]="n.ruta"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">
        {{ n.titulo }}
      </a>
    </nav>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<app-agent-panel></app-agent-panel>
<app-contracts-modal></app-contracts-modal>
